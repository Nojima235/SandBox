<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BBナビ</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
  margin:0;
  background: transparent;
  color:#111;
}

html, body{
  height: 100%;
  overflow: hidden;
}

html::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;

  background:
    linear-gradient(rgba(246,247,249,0.60), rgba(246,247,249,0.60)),
    url("img/consaru.png") center/150% repeat,
    #f6f7f9;
}

html[data-theme="dark"]::before{
  background:
    linear-gradient(rgba(11,12,16,0.78), rgba(11,12,16,0.78)),
    url("img/consaru.png") center/150% repeat,
    #0b0f19;
}

header{
  padding: var(--header-pad-top) var(--header-pad-x) var(--header-pad-bottom);
  background:var(--panel);
  border-bottom:1px solid #e6e8eb;
  position:relative;
}
.title{font-size:24px;font-weight:800;}
.sub{font-size:15px;color:#555;margin-top:4px;}
.devBadge{
  position:absolute;
  top:50%;
  left:35%;
  transform:translate(-50%, -50%);
  font-size:15px;
  font-weight:900;
  letter-spacing:.12em;
  color:#fff;
  background:#d40000;
  padding:7px 16px;
  border-radius:999px;
  opacity:0.85;
  pointer-events:none;
}

.wrap{
  height: calc(100dvh - var(--header-h));
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  max-width: var(--maxw);
  margin: 0 auto;
  padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
}

html::before{
  transform: translateZ(0);
  will-change: transform;
  backface-visibility: hidden;
}
.stack{ display:grid; gap:12px; margin-top:0px; }

.card{
  background:#fff;
  border:2px solid #e6e8eb;
  border-radius:20px;
  padding:18px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}
.sectionTitle{
  margin:0 0 10px;
  font-size:16px;
  font-weight:900;
}
.divider{ height:1px; background:#eef0f3; margin:14px 0; }

label{
  display:block;
  font-size:12px;
  font-weight:900;
  color:#333;
  margin:0 0 6px;
}
select{
  width:100%;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid #e6e8eb;
  background:#fff;
  font-weight:800;
  font-size:14px;
}

.grid2{
  display:grid;
  gap:10px;
  grid-template-columns: 1fr 1fr;
}
@media (max-width: 640px){
  .grid2{ grid-template-columns: 1fr; }
}

.bbFromRow{
  display:grid;
  grid-template-columns: 140px 1fr;
  gap:14px;
  align-items:center;
}
.bbFromIcon{
  width:140px;
  min-width:140px;
  height:140px;
  border-radius:22px;
  border:2px solid #2563eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(37,99,235,.18);
}
.bbFromIcon img{
  width:96px;
  height:96px;
  object-fit:contain;
}
.bbFromRight{ min-width:0; }

@media (max-width: 640px){
  .bbFromRow{ grid-template-columns: 110px 1fr; gap:12px; }
  .bbFromIcon{ width:110px; min-width:110px; height:110px; border-radius:18px; }
  .bbFromIcon img{ width:78px; height:78px; }
}

.pillRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin:2px 0 10px;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border:1px solid #e6e8eb;
  border-radius:999px;
  background:#fff;
  font-weight:900;
  font-size:13px;
  width:fit-content;
}
.pill .dot{
  width:8px;height:8px;border-radius:999px;background:#111;opacity:.25;
}

.houseGrid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  margin:2px 0 10px;
}
.houseCard{
  height:54px;
  border-radius:16px;
  border:2px solid #e6e8eb;
  background:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 10px;
  cursor:pointer;
  transition:.15s ease;
  box-shadow:0 3px 10px rgba(0,0,0,.06);
}
.houseCard:hover{ transform:translateY(-1px); }
.houseCard.on{
  border-color:#2563eb;
  box-shadow:0 10px 22px rgba(37,99,235,.16);
}
.houseCard img{ width:34px; height:34px; object-fit:contain; }
.houseCard .txt{ font-weight:900; font-size:15px; }

.primaryGrid{
  display:grid;
  gap:14px;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}
.primaryCard{
  height:148px;
  border-radius:22px;
  border:2px solid #e6e8eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.15s ease;
  box-shadow:0 6px 16px rgba(0,0,0,.07);
}
.primaryCard:hover{ transform:translateY(-2px); }
.primaryCard.on{
  border-color:#2563eb;
  box-shadow:0 12px 28px rgba(37,99,235,.18);
}
.primaryCard img{
  width:132px;
  height:132px;
  object-fit:contain;
  filter:grayscale(1);
  opacity:.78;
}
.primaryCard.on img{ filter:none; opacity:1; }

.typeGrid{
  display:grid;
  gap:12px;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  margin-top:12px;
}
.typeCard{
  height:92px;
  border-radius:18px;
  border:2px solid #e6e8eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.15s ease;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}
.typeCard:hover{ transform:translateY(-1px); }
.typeCard.on{
  border-color:#2563eb;
  box-shadow:0 10px 24px rgba(37,99,235,.16);
}
.typeCard img{
  width:68px;
  height:68px;
  object-fit:contain;
  filter:grayscale(1);
  opacity:.78;
}
.typeCard.on img{ filter:none; opacity:1; }

.moreRow{
  display:flex;
  justify-content:flex-end;
  margin-top:10px;
}
.moreBtn{
  border:1px solid #d9dde3;
  background:#fff;
  border-radius:14px;
  padding:10px 12px;
  font-weight:900;
  cursor:pointer;
  user-select:none;
  box-shadow:0 6px 16px rgba(0,0,0,.06);
}
.moreBtn:active{ transform:translateY(1px) scale(0.99); }

.appSwitch{
  position:fixed;
  right:18px;
  bottom:18px;
  display:flex;
  gap:14px;
  z-index:9999;
}
.appSwitch a{
  width:64px;
  height:64px;
  display:grid;
  place-items:center;
  border-radius:22px;
  border:1px solid #d9dde3;
  background:#fff;
  text-decoration:none;
  box-shadow:0 10px 26px rgba(0,0,0,0.18);
  font-size:30px;
}
.appSwitch a.on{ border-color:#111; }

/* ===== 契約ナビと同じチェックリスト見た目 ===== */
.donebox{
  background:#f6fbff;
  border:1px solid #d6e8ff;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}
.donebox b{
  display:inline-block;
  margin-bottom:6px;
}
.checklist{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.checkitem{
  display:flex;gap:10px;align-items:flex-start;
  border:1px solid #e6e8eb;border-radius:12px;padding:10px 12px;background:#fff;
}
.checkitem input{margin-top:2px;transform:scale(1.2);}
.checkitem .ctitle{font-size:15px;font-weight:700;}
.checkitem .csub{font-size:14px;color:#555;margin-top:2px;line-height:1.35;}
.warn{background:#fff5f5;border:1px solid #ffd2d2;border-radius:12px;padding:12px;margin-top:10px;font-size:15px;}
:root{
  /* light */
  --bg: #f6f7f9;
  --panel: #ffffff;
  --text: #111111;
  --muted: #555555;

  --border: #e6e8eb;
  --border2:#d9dde3;
  --soft: #eef0f3;

  --chip: #f8fafc;
  --chip2:#f3f4f6;

  --noteBg:#f6fbff;
  --noteBd:#d6e8ff;
  --noteTx:#223344;

  --dangerBg:#fff5f5;
  --dangerBd:#ffd2d2;
  --dangerTx:#b00020;

  --track:#e9ecef;

  /* accent */
  --accent:#198754;
  --accent-weak: color-mix(in srgb, var(--accent) 18%, var(--panel));
  --accent-border: color-mix(in srgb, var(--accent) 45%, var(--border2));
  --accent-text: color-mix(in srgb, var(--accent) 60%, #0b2a14);

  --selectedBg: color-mix(in srgb, var(--accent) 12%, var(--panel));
  --selectedBd: color-mix(in srgb, var(--accent) 45%, var(--border2));

  --maxw: 960px;

  /* 左右の基本余白（iPadでもPCでも同じにする基準） */
  --pad-x: 16px;

  /* 上下の基本余白 */
  --pad-top: 12px;
  --pad-bottom: 40px;

  /* header の内側余白 */
  --header-pad-x: 16px;
  --header-pad-top: 16px;
  --header-pad-bottom: 8px;
  
  --header-h: 90px;
}

body[data-theme="dark"]{
  --bg:#0b0f19;
  --panel:#121826;
  --text:#e6e8ef;
  --muted:#aab3c2;

  --border:#2b3446;
  --border2:#3a4660;
  --soft:#1a2435;

  --chip:#0f172a;
  --chip2:#0b1220;

  --noteBg:#0b1b2e;
  --noteBd:#1b3a63;
  --noteTx:#cfe4ff;

  --dangerBg:#2a1216;
  --dangerBd:#6b1f2a;
  --dangerTx:#ffb4c0;

  --track:#1d2738;

  --accent:#198754;
  --accent-weak: color-mix(in srgb, var(--accent) 16%, var(--panel));
  --accent-border: color-mix(in srgb, var(--accent) 45%, var(--border2));
  --accent-text: color-mix(in srgb, var(--accent) 70%, #cfeeda);

  --selectedBg: color-mix(in srgb, var(--accent) 12%, var(--panel));
  --selectedBd: color-mix(in srgb, var(--accent) 55%, var(--border2));
}

html[data-theme="dark"]{
  --bg:#0b0c10;
  --text:#e9edf2;
  --muted:#aab3bf;

  --panel:#121522;
  --border:rgba(255,255,255,.10);
  --border2:rgba(255,255,255,.14);

  --shadowCard: 0 10px 26px rgba(0,0,0,0.35);
  --shadowBtn:  0 10px 26px rgba(0,0,0,0.35);

  --accent:#78aaff;

  --warnBg: rgba(255,80,80,.10);
  --warnBd: rgba(255,80,80,.28);

  --doneBg: rgba(120,180,255,.10);
  --doneBd: rgba(120,180,255,.22);
}

/* ベース反映 */
body{
  color: var(--text) !important;
  position:relative;
}
header{
  border-bottom:1px solid var(--border) !important;
}
.sub{ color: var(--muted) !important; }

/* カード類 */
.card{
  background: var(--panel) !important;
  border-color: var(--border) !important;
  box-shadow: var(--shadowCard) !important;
}
.divider{ background: rgba(255,255,255,.06); }
html:not([data-theme="dark"]) .divider{ background:#eef0f3; }

/* 入力 */
label{ color: var(--text) !important; }
select{
  background: var(--panel) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}

/* 選択カード */
.bbFromIcon{
  border-color: var(--accent) !important;
  background: var(--panel) !important;
  box-shadow: 0 10px 24px rgba(37,99,235,.18);
}
html[data-theme="dark"] .bbFromIcon{
  box-shadow: 0 10px 24px rgba(120,170,255,.18);
}

.houseCard,
.primaryCard,
.typeCard{
  background: var(--panel) !important;
  border-color: var(--border) !important;
}
.houseCard.on,
.primaryCard.on,
.typeCard.on{
  border-color: var(--accent) !important;
  box-shadow: 0 12px 28px rgba(37,99,235,.18);
}
html[data-theme="dark"] .houseCard.on,
html[data-theme="dark"] .primaryCard.on,
html[data-theme="dark"] .typeCard.on{
  box-shadow: 0 12px 28px rgba(120,170,255,.18);
}

/* ピル */
.pill{
  background: var(--panel) !important;
  border-color: var(--border) !important;
  color: var(--text) !important;
}
.pill .dot{ background: var(--text); opacity:.22; }

/* チェックリスト/警告 */
.donebox{
  background: var(--doneBg) !important;
  border-color: var(--doneBd) !important;
}
.checkitem{
  background: var(--panel) !important;
  border-color: var(--border) !important;
}
.checkitem .csub{ color: var(--muted) !important; }

.warn{
  background: var(--warnBg) !important;
  border-color: var(--warnBd) !important;
  color: var(--text) !important;
}

/* appSwitch */
.appSwitch a{
  background: var(--panel) !important;
  border-color: var(--border2) !important;
  box-shadow: var(--shadowBtn) !important;
}
.appSwitch a.on{ border-color: var(--text) !important; }

</style>
</head>

<script>
const APP_THEME_KEY = "APP_THEME_V1";

function getSystemTheme(){
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
    ? "dark" : "light";
}
function applyTheme(theme){
  const t = (theme === "dark" || theme === "light") ? theme : getSystemTheme();
  document.documentElement.setAttribute("data-theme", t);
}
function loadTheme(){
  const saved = localStorage.getItem(APP_THEME_KEY);
  applyTheme(saved || getSystemTheme());
}
loadTheme();

/* 他ページ/他タブでテーマ変わったら即反映 */
window.addEventListener("storage", (ev)=>{
  if (ev.key === APP_THEME_KEY) loadTheme();
});

/* OS側が変わった時：保存が無ければ追従 */
if (window.matchMedia){
  const mq = window.matchMedia("(prefers-color-scheme: dark)");
  const onChange = ()=>{ if (!localStorage.getItem(APP_THEME_KEY)) applyTheme(getSystemTheme()); };
  if (mq.addEventListener) mq.addEventListener("change", onChange);
  else if (mq.addListener) mq.addListener(onChange);
}
const STORAGE_KEY = "contract_navi_ctx_v2_multi";

function loadShared(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return { houseNet:{} };
  try{ return JSON.parse(raw); }
  catch{ return { houseNet:{} }; }
}
function saveShared(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function toggleTheme(){
  const cur = document.documentElement.getAttribute("data-theme") || getSystemTheme();
  const next = (cur === "dark") ? "light" : "dark";
  localStorage.setItem(APP_THEME_KEY, next);
  applyTheme(next);
}

window.addEventListener("DOMContentLoaded", ()=>{
  const title = document.querySelector("header .title");
  if (!title) return;

  title.addEventListener("dblclick", toggleTheme);

  let timer=null;
  const start=()=>{ timer=setTimeout(()=>{ toggleTheme(); timer=null; }, 420); };
  const cancel=()=>{ if(timer){ clearTimeout(timer); timer=null; } };

  title.addEventListener("touchstart", start, {passive:true});
  title.addEventListener("touchend", cancel, {passive:true});
  title.addEventListener("touchcancel", cancel, {passive:true});
  title.addEventListener("mousedown", start);
  title.addEventListener("mouseup", cancel);
  title.addEventListener("mouseleave", cancel);
});

const BB_LABEL = {
  docomohikari:"ドコモ光",
  softbankhikari:"ソフトバンク光",
  niftyhikari:"@nifty光",
  fletshikari:"フレッツ光",
  auhikari:"auひかり",
  nurohikari:"NURO光",
  jcom:"J:COM",
  biglobehikari:"ビッグローブ光",
};

const BB_ICON = {
  fletshikari:   "icons/Flets.png",
  nurohikari:    "icons/Nuro.png",
  docomohikari:  "icons/docomohikari.png",
  niftyhikari:   "icons/Nifty.png",
  softbankhikari:"icons/SBhikari.png",
  biglobehikari: "icons/BIGLOBE.png",
  auhikari:      "icons/auhikari.png",
  jcom:          "icons/JCOM.png"
};

const PRIMARY_PROVIDERS = ["docomohikari","softbankhikari","niftyhikari"];
const TYPE_PROVIDERS = ["fletshikari","auhikari","nurohikari","jcom","biglobehikari"];

const HOUSING = [
  { key:"mansion", label:"マンション", icon:"img/apartment.png" },
  { key:"house",   label:"戸建て",     icon:"img/house.png"   }
];

function lineFamily(key){
  if(!key) return "unknown";
  if(key === "auhikari" || key === "jcom") return "kddi";
  if(key === "nurohikari") return "other";
  if(key === "fletshikari" || key === "docomohikari" || key === "softbankhikari" || key === "niftyhikari" || key === "biglobehikari") return "ntt";
  return "unknown";
}

function lineFamilyLabel(fam){
  if (fam === "ntt")  return "NTT回線";
  if (fam === "kddi") return "KDDI回線";
  if (fam === "other")return "独自回線";
  return "未設定/不明";
}

function decisionFrom(hn){
  const fromKey = hn.homeNetType || "";
  const toKey   = hn.toNetType || "";
  const fromFam = lineFamily(fromKey);
  const toFam   = lineFamily(toKey);

  const cap = String(hn.homeCap || "");
  const rack = String(hn.rackSearch || "");
  const housing = String(hn.housingType || "");

  const wants10g = (cap === "10");
  const capKnown = (cap === "1" || cap === "10");

  let work = "要確認";
  let proc = "要確認";

  if(fromKey && toKey){
    const famChanged = (fromFam !== "unknown" && toFam !== "unknown" && fromFam !== toFam);

    if(fromFam === "other" || toFam === "other"){
      work = "工事あり";
      proc = "新規（回線切替）";
    } else if(famChanged){
      work = "工事あり";
      proc = "新規（回線切替）";
    } else {
      work = "工事なし（原則）";
      proc = (fromKey === "fletshikari" && toFam === "ntt") ? "転用"
           : (fromFam === "ntt" && toFam === "ntt") ? "事業者変更"
           : "要確認";
    }
  }

  if(capKnown && wants10g){
    if(work === "工事なし（原則）") work = "工事あり（10G切替）";
    if(housing === "mansion" && rack === "no") work = "要確認（ラック不可）";
  }

  const phone = String(hn.hikariPhone || "");
  const hasPhone = (phone === "yes");

  return { work, proc, hasPhone, housing, rack, wants10g, fromKey, toKey, fromFam, toFam };
}

function checklistFrom(d){
  const items = [];

  if(!d.fromKey || !d.toKey){
    items.push({ id:"sel_pair", t:"現回線/乗換先を選択", s:"まずは両方選ぶと判定が出ます" });
    return items;
  }

  if(d.proc === "事業者変更"){
    items.push({ id:"code_biz", t:"事業者変更番号を取得", s:"現事業者へ案内（有効期限に注意）" });
  } else if(d.proc === "転用"){
    items.push({ id:"code_tenyo", t:"転用承諾番号を取得", s:"フレッツ側の番号が必要" });
  } else if(String(d.proc).includes("新規")){
    items.push({ id:"new_apply", t:"新規申込（回線切替）", s:"現回線は解約/撤去の要否を確認" });
  } else {
    items.push({ id:"proc_check", t:"手続き種別を確認", s:"事業者変更/転用/新規のどれかを確定" });
  }

  if(String(d.work).includes("工事あり")){
    items.push({ id:"work_date", t:"工事日の調整", s:"立会い有無、希望日、工期目安を説明" });
    items.push({ id:"work_place", t:"宅内配線・設置場所の確認", s:"ONU位置、配線経路、電源" });
  } else if(String(d.work).includes("要確認")){
    items.push({ id:"work_recheck", t:"提供可否/工事要否の再確認", s:"物件状況・設備・エリアで変動" });
  } else {
    items.push({ id:"switch_date", t:"切替日（開通日）の調整", s:"利用停止期間が出ないように" });
  }

  if(d.wants10g){
    items.push({ id:"10g_area", t:"10G提供可否の確認", s:"戸建/マンション、設備条件" });
    if(d.housing === "mansion"){
      items.push({ id:"rack_check", t:"ラック検索結果を確認", s:"不可の場合は10Gが難しい可能性" });
    }
  }

  if(d.hasPhone){
    items.push({ id:"phone_keep", t:"光電話の継続可否を案内", s:"番号・工事・切替タイミングに注意" });
  } else {
    items.push({ id:"phone_none", t:"光電話なし（確認）", s:"不要ならOK、必要なら追加提案" });
  }

  items.push({ id:"equip_return", t:"レンタル機器の返却/撤去確認", s:"ONU/ルータ/TV機器など" });
  items.push({ id:"wifi_setup", t:"Wi-Fi再設定の案内", s:"SSID/パス、メッシュ/中継器" });
  items.push({ id:"fee_check", t:"違約金・工事費残債の確認", s:"更新月/解約金/残債有無" });

  return items;
}

function renderChecklist(shared, hn){
  const decHost = document.getElementById("bbDecision");
  const listHost = document.getElementById("bbChecklist");
  if(!decHost || !listHost) return;

  hn.bbChecks = hn.bbChecks || {};

  const d = decisionFrom(hn);

  if (!d.fromKey || !d.toKey){
    decHost.style.display = "none";
  } else {
    decHost.style.display = "";
    decHost.innerHTML =
      `<b>判定</b><div style="margin-top:6px; line-height:1.5;">
        工事：<span style="font-weight:900;">${d.work}</span><br>
        手続き：<span style="font-weight:900;">${d.proc}</span>
      </div>`;
  }

  const items = checklistFrom(d);
  listHost.innerHTML = "";

  items.forEach((it)=>{
    const row = document.createElement("div");
    row.className = "checkitem";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = !!hn.bbChecks[it.id];
    cb.onchange = ()=>{
      hn.bbChecks[it.id] = cb.checked;
      saveShared(shared);
    };

    const right = document.createElement("div");
    const t = document.createElement("div");
    t.className = "ctitle";
    t.textContent = it.t;

    const s = document.createElement("div");
    s.className = "csub";
    s.textContent = it.s || "";

    right.appendChild(t);
    if (it.s) right.appendChild(s);

    row.appendChild(cb);
    row.appendChild(right);
    listHost.appendChild(row);
  });
}

function render(){
  const shared = loadShared();
  shared.houseNet = shared.houseNet || {};
  const hn = shared.houseNet;

  if(!hn.housingType) hn.housingType = "mansion";

  const fromKey = hn.homeNetType || "";
  const toKey   = hn.toNetType || "";

  const iconEl = document.getElementById("bbFromIcon");
  if(iconEl){
    const src = BB_ICON[fromKey] || "";
    if(src){
      iconEl.innerHTML = `<img src="${src}" alt="">`;
    }else{
      iconEl.innerHTML = `<div style="font-weight:900;color:#777;">未設定</div>`;
    }
  }

  const famText = document.getElementById("bbLineTypeText");
  if (famText){
    famText.textContent = lineFamilyLabel(lineFamily(fromKey));
  }

  const bindSelect = (id, key, fallback) => {
    const el = document.getElementById(id);
    if(!el) return;
    if(!(key in hn) || hn[key] === undefined || hn[key] === null || hn[key] === "") hn[key] = fallback;
    el.value = hn[key];
    el.onchange = ()=>{
      hn[key] = el.value;
      saveShared(shared);
      render();
    };
  };

  bindSelect("homeCap", "homeCap", "");
  bindSelect("router", "router", "");
  bindSelect("hikariPhone", "hikariPhone", "");
  bindSelect("rackSearch", "rackSearch", "");

  const primaryHost = document.getElementById("bbPrimary");
  if(primaryHost){
    primaryHost.innerHTML = "";
    PRIMARY_PROVIDERS
      .filter(k => k !== fromKey)
      .forEach(key=>{
        const c = document.createElement("div");
        c.className = "primaryCard" + (key === toKey ? " on" : "");
        const img = document.createElement("img");
        img.src = BB_ICON[key] || "";
        img.alt = BB_LABEL[key] || key;
        c.title = img.alt;
        c.appendChild(img);
        c.onclick = ()=>{
          hn.toNetType = key;
          saveShared(shared);
          render();
        };
        primaryHost.appendChild(c);
      });
  }

  const typeHost = document.getElementById("bbType");
  if(typeHost){
    typeHost.innerHTML = "";
    TYPE_PROVIDERS
      .filter(k => k !== fromKey)
      .forEach(key=>{
        const c = document.createElement("div");
        c.className = "typeCard"                                                                                                                                                                                                   (key === toKey ? " on" : "");
        const img = document.createElement("img");
        img.src = BB_ICON[key] || "";
        img.alt = BB_LABEL[key] || key;
        c.title = img.alt;
        c.appendChild(img);
        c.onclick = ()=>{
          hn.toNetType = key;
          saveShared(shared);
          render();
        };
        typeHost.appendChild(c);
      });
  }

  const houseHost = document.getElementById("housingGrid");
  if(houseHost){
    houseHost.innerHTML = "";
    HOUSING.forEach(h=>{
      const c = document.createElement("div");
      c.className = "houseCard" + (h.key === hn.housingType ? " on" : "");
      c.title = h.label;

      const img = document.createElement("img");
      img.src = h.icon;
      img.alt = h.label;

      const txt = document.createElement("div");
      txt.className = "txt";
      txt.textContent = h.label;

      c.appendChild(img);
      c.appendChild(txt);
      c.onclick = ()=>{
        hn.housingType = h.key;
        saveShared(shared);
        render();
      };

      houseHost.appendChild(c);
    });
  }

  const rackSel = document.getElementById("rackSearch");
  const isMansion = (hn.housingType === "mansion");
  if(rackSel){
    rackSel.disabled = !isMansion;
    rackSel.style.opacity = isMansion ? "1" : "0.55";
  }

  renderChecklist(shared, hn);
}

document.getElementById("moreBtn")?.addEventListener("click", ()=>{
  const wrap = document.getElementById("bbTypeWrap");
  if(!wrap) return;
  const open = (wrap.style.display !== "none");
  wrap.style.display = open ? "none" : "block";
  document.getElementById("moreBtn").textContent = open ? "＋" : "－";
});

render();
</script>
</body>
</html>
