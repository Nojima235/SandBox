<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BBナビ</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
  margin:0;
  background:#f6f7f9;
  color:#111;
}

/* ===== ヘッダー ===== */
header{
  padding:16px 16px 8px;
  background:#fff;
  border-bottom:1px solid #e6e8eb;
  position:relative;
}
.title{font-size:24px;font-weight:800;}
.sub{font-size:15px;color:#555;margin-top:4px;}
.devBadge{
  position:absolute;
  top:50%;
  left:35%;
  transform:translate(-50%, -50%);
  font-size:15px;
  font-weight:900;
  letter-spacing:.12em;
  color:#fff;
  background:#d40000;
  padding:7px 16px;
  border-radius:999px;
  opacity:0.85;
  pointer-events:none;
}

/* ===== 共通 ===== */
.wrap{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}
.card{
  background:#fff;
  border:2px solid #e6e8eb;
  border-radius:20px;
  padding:18px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}
.stack{ display:grid; gap:16px; margin-top:18px; }

.sectionTitle{
  margin:0 0 10px;
  font-size:16px;
  font-weight:900;
}
.subNote{
  margin-top:6px;
  font-size:12px;
  color:#666;
}
.divider{
  height:1px;
  background:#eef0f3;
  margin:14px 0;
}

/* ===== 乗り換え元（大きく1枚） ===== */
.fromRow{ display:flex; align-items:center; gap:16px; }
.fromBig{
  width:140px;
  height:104px;
  border-radius:20px;
  border:2px solid #2563eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 24px rgba(37,99,235,.18);
}
.fromBig img{
  width:84px;
  height:84px;
  object-fit:contain;
}

/* ===== グループ囲い（ムダを減らす） ===== */
.groupWrap{
  display:grid;
  grid-template-columns: 1fr;
  gap:12px;
}
@media(min-width:720px){
  .groupWrap{ grid-template-columns: 1fr 1fr; }
  .groupWrap .groupBox:last-child{ grid-column: 1 / -1; } /* 3つ目を横断してバランス */
}

.groupBox{
  border:2px solid #eef0f3;
  border-radius:18px;
  padding:12px;
  background:#fbfbfc;
}
.groupTitle{
  font-size:13px;
  font-weight:900;
  color:#333;
  margin:0 0 10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.groupTitle .dot{
  width:8px;height:8px;border-radius:999px;background:#111;opacity:.25;
}

/* ===== 乗り換え先（カード） ===== */
.netGrid{
  display:grid;
  gap:12px;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
}

/* アイコンカード */
.netCard{
  height:96px;
  border-radius:18px;
  border:2px solid #e6e8eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.15s ease;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}
.netCard:hover{ transform:translateY(-2px); }
.netCard.on{
  border-color:#2563eb;
  box-shadow:0 10px 24px rgba(37,99,235,.18);
}
.netCard img{
  width:68px;
  height:68px;
  object-fit:contain;
  filter:grayscale(1);
  opacity:.78;
}
.netCard.on img{ filter:none; opacity:1; }

/* 現在回線は選択不可 */
.netCard.disabled{
  cursor:not-allowed;
  opacity:.55;
}
.netCard.disabled img{
  filter:grayscale(1);
  opacity:.55;
}

/* ===== 住居タイプ（PNGを使うミニカード2択） ===== */
.houseGrid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
}
.houseCard{
  height:64px;
  border-radius:18px;
  border:2px solid #e6e8eb;
  background:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  cursor:pointer;
  transition:.15s ease;
  box-shadow:0 3px 10px rgba(0,0,0,.06);
}
.houseCard:hover{ transform:translateY(-1px); }
.houseCard.on{
  border-color:#2563eb;
  box-shadow:0 10px 22px rgba(37,99,235,.16);
}
.houseCard img{
  width:38px;
  height:38px;
  object-fit:contain;
}
.houseCard .txt{
  font-weight:900;
  font-size:15px;
}

/* ===== アプリ切替 ===== */
.appSwitch{
  position:fixed;
  right:18px;
  bottom:18px;
  display:flex;
  gap:14px;
  z-index:9999;
}
.appSwitch a{
  width:64px;
  height:64px;
  display:grid;
  place-items:center;
  border-radius:22px;
  border:1px solid #d9dde3;
  background:#fff;
  text-decoration:none;
  box-shadow:0 10px 26px rgba(0,0,0,0.18);
  font-size:30px;
}
.appSwitch a.on{ border-color:#111; }
</style>
</head>

<body>

<header>
  <div class="title">BBナビ</div>
  <div class="sub">光回線の見積もり</div>
  <div class="devBadge">⚠ 開発中 ⚠</div>
</header>

<div class="wrap">
  <div class="stack">

    <!-- ===== 光回線 ===== -->
    <div class="card">
      <div class="sectionTitle">現在お使いの光回線</div>
      <div id="bbFrom" class="fromRow"></div>
      <div class="subNote">※契約ナビのヒアリング情報を表示しています</div>

      <div class="divider"></div>

      <div class="sectionTitle">これから乗り換える光回線</div>
      <div id="bbToGroups" class="groupWrap"></div>
    </div>

    <!-- ===== 住居タイプ（PNG） ===== -->
    <div class="card">
      <div class="sectionTitle">住居タイプ</div>
      <div class="houseGrid" id="housingGrid"></div>
      <div class="subNote">※月額や工事可否に影響します</div>
    </div>

  </div>
</div>

<nav class="appSwitch">
  <a href="ContractNavigator.html">📋</a>
  <a href="CarrierPalette.html">📱</a>
  <a href="BBNavigator.html" class="on">🏠</a>
</nav>

<script>
const STORAGE_KEY = "contract_navi_ctx_v2_multi";

function loadShared(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return { houseNet:{} };
  try{ return JSON.parse(raw); }
  catch{ return { houseNet:{} }; }
}
function saveShared(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* ===== 光回線：グループ定義（要望どおり） ===== */
const BB_GROUPS = [
  { title:"NTT回線",  keys:["docomohikari","niftyhikari","softbankhikari","biglobehikari"] },
  { title:"KDDI回線", keys:["jcom","auhikari"] },
  { title:"そのほか", keys:["fletshikari","nurohikari"] }
];

const BB_LABEL = {
  fletshikari:"フレッツ光",
  nurohikari:"NURO光",
  docomohikari:"ドコモ光",
  niftyhikari:"@nifty光",
  softbankhikari:"ソフトバンク光",
  biglobehikari:"ビッグローブ光",
  auhikari:"auひかり",
  jcom:"J:COM"
};

const BB_ICON = {
  fletshikari:   "icons/flets.png",
  nurohikari:    "icons/nuro.png",
  docomohikari:  "icons/docomohikari.png",
  niftyhikari:   "icons/nifty.png",
  softbankhikari:"icons/SBhikari.png",
  biglobehikari: "icons/BIGLOBE.png",
  auhikari:      "icons/auhikari.png",
  jcom:          "icons/JCOM.png"
};

function renderNetIcons(shared){
  shared.houseNet = shared.houseNet || {};
  const fromKey = shared.houseNet.homeNetType || "";
  const toKey   = shared.houseNet.toNetType || "";

  /* ===== 乗り換え元（1枚） ===== */
  const fromHost = document.getElementById("bbFrom");
  fromHost.innerHTML = "";

  const box = document.createElement("div");
  box.className = "fromBig";
  const img = document.createElement("img");
  img.src = BB_ICON[fromKey] || "";
  img.alt = BB_LABEL[fromKey] || "未設定";
  box.title = img.alt;
  if(!img.src) img.style.opacity = ".35";
  box.appendChild(img);
  fromHost.appendChild(box);

  /* ===== 乗り換え先（囲い＋同一グリッド） ===== */
  const groupsHost = document.getElementById("bbToGroups");
  groupsHost.innerHTML = "";

  BB_GROUPS.forEach(g=>{
    const group = document.createElement("div");
    group.className = "groupBox";

    const title = document.createElement("div");
    title.className = "groupTitle";
    title.innerHTML = `<span class="dot"></span>${g.title}`;
    group.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "netGrid";

    g.keys.forEach(key=>{
      const card = document.createElement("div");
      const isCurrent = key === fromKey;
      const isOn = key === toKey;

      card.className = "netCard" + (isOn ? " on" : "") + (isCurrent ? " disabled" : "");

      const im = document.createElement("img");
      im.src = BB_ICON[key] || "";
      im.alt = BB_LABEL[key] || key;
      card.title = isCurrent ? `${im.alt}（現在ご利用中のため選択不可）` : im.alt;
      if(!im.src) im.style.opacity = ".35";
      card.appendChild(im);

      if(!isCurrent){
        card.onclick = ()=>{
          shared.houseNet.toNetType = key;
          saveShared(shared);
          render();
        };
      }

      grid.appendChild(card);
    });

    group.appendChild(grid);
    groupsHost.appendChild(group);
  });
}

/* ===== 住居タイプ（PNG） ===== */
const HOUSING = [
  { key:"mansion", label:"マンション", icon:"img/apartment.png" },
  { key:"house",   label:"戸建て",     icon:"img/house.png"   }
];

function renderHousing(shared){
  shared.houseNet = shared.houseNet || {};
  const type = shared.houseNet.housingType || "";

  const host = document.getElementById("housingGrid");
  host.innerHTML = "";

  HOUSING.forEach(h=>{
    const card = document.createElement("div");
    card.className = "houseCard" + (h.key === type ? " on" : "");
    card.title = h.label;

    const img = document.createElement("img");
    img.src = h.icon;
    img.alt = h.label;

    const txt = document.createElement("div");
    txt.className = "txt";
    txt.textContent = h.label;

    card.appendChild(img);
    card.appendChild(txt);

    card.onclick = ()=>{
      shared.houseNet.housingType = h.key;
      saveShared(shared);
      render();
    };

    host.appendChild(card);
  });
}

function render(){
  const shared = loadShared();
  renderNetIcons(shared);
  renderHousing(shared);
}

render();
</script>

</body>
</html>
