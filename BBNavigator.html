<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BBナビ</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
  margin:0;
  background:#f6f7f9;
  color:#111;
}

/* ===== ヘッダー ===== */
header{
  padding:16px 16px 8px;
  background:#fff;
  border-bottom:1px solid #e6e8eb;
  position:relative;
}
.title{font-size:24px;font-weight:800;}
.sub{font-size:15px;color:#555;margin-top:4px;}
.devBadge{
  position:absolute;
  top:50%;
  left:35%;
  transform:translate(-50%, -50%);
  font-size:15px;
  font-weight:900;
  letter-spacing:.12em;
  color:#fff;
  background:#d40000;
  padding:7px 16px;
  border-radius:999px;
  opacity:0.85;
  pointer-events:none;
}

/* ===== 共通 ===== */
.wrap{ max-width:900px; margin:0 auto; padding:20px; }
.stack{ display:grid; gap:16px; margin-top:18px; }

.card{
  background:#fff;
  border:2px solid #e6e8eb;
  border-radius:20px;
  padding:18px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}
.sectionTitle{
  margin:0 0 10px;
  font-size:16px;
  font-weight:900;
}
.subNote{
  margin-top:6px;
  font-size:12px;
  color:#666;
}
.divider{ height:1px; background:#eef0f3; margin:14px 0; }

/* ===== 現在回線（でかく1枚） ===== */
.fromRow{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.fromBig{
  width:150px;
  height:110px;
  border-radius:20px;
  border:2px solid #2563eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 24px rgba(37,99,235,.18);
}
.fromBig img{ width:88px; height:88px; object-fit:contain; }
.fromMeta{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-weight:900;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #e6e8eb;
  background:#fff;
  color:#333;
}
.badge .dot{ width:8px; height:8px; border-radius:999px; background:#111; opacity:.25; }

/* ===== 選択エリア：囲い ===== */
.box{
  border:2px solid #eef0f3;
  border-radius:18px;
  padding:12px;
  background:#fbfbfc;
  margin-top:12px;
}
.boxTitle{
  font-size:13px;
  font-weight:900;
  color:#333;
  margin:0 0 10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.boxTitle .dot{
  width:8px;height:8px;border-radius:999px;background:#111;opacity:.25;
}

/* ===== 主役3社（大） ===== */
.primaryGrid{
  display:grid;
  gap:14px;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}
.primaryCard{
  height:128px;
  border-radius:20px;
  border:2px solid #e6e8eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.15s ease;
  box-shadow:0 6px 16px rgba(0,0,0,.07);
}
.primaryCard:hover{ transform:translateY(-2px); }
.primaryCard.on{
  border-color:#2563eb;
  box-shadow:0 12px 28px rgba(37,99,235,.18);
}
.primaryCard img{
  width:96px;
  height:96px;
  object-fit:contain;
  filter:grayscale(1);
  opacity:.78;
}
.primaryCard.on img{ filter:none; opacity:1; }
.primaryCard.disabled{ cursor:not-allowed; opacity:.55; }
.primaryCard.disabled img{ filter:grayscale(1); opacity:.55; }

/* ===== 回線種別（小） ===== */
.typeGrid{
  display:grid;
  gap:12px;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
}
.typeCard{
  height:92px;
  border-radius:18px;
  border:2px solid #e6e8eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.15s ease;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}
.typeCard:hover{ transform:translateY(-1px); }
.typeCard.on{
  border-color:#2563eb;
  box-shadow:0 10px 24px rgba(37,99,235,.16);
}
.typeCard img{
  width:68px;
  height:68px;
  object-fit:contain;
  filter:grayscale(1);
  opacity:.78;
}
.typeCard.on img{ filter:none; opacity:1; }
.typeCard.disabled{ cursor:not-allowed; opacity:.55; }
.typeCard.disabled img{ filter:grayscale(1); opacity:.55; }

/* ===== 住居タイプ（PNG 2択） ===== */
.houseGrid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
}
.houseCard{
  height:64px;
  border-radius:18px;
  border:2px solid #e6e8eb;
  background:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  cursor:pointer;
  transition:.15s ease;
  box-shadow:0 3px 10px rgba(0,0,0,.06);
}
.houseCard:hover{ transform:translateY(-1px); }
.houseCard.on{
  border-color:#2563eb;
  box-shadow:0 10px 22px rgba(37,99,235,.16);
}
.houseCard img{ width:38px; height:38px; object-fit:contain; }
.houseCard .txt{ font-weight:900; font-size:15px; }

/* ===== アプリ切替 ===== */
.appSwitch{
  position:fixed;
  right:18px;
  bottom:18px;
  display:flex;
  gap:14px;
  z-index:9999;
}
.appSwitch a{
  width:64px;
  height:64px;
  display:grid;
  place-items:center;
  border-radius:22px;
  border:1px solid #d9dde3;
  background:#fff;
  text-decoration:none;
  box-shadow:0 10px 26px rgba(0,0,0,0.18);
  font-size:30px;
}
.appSwitch a.on{ border-color:#111; }
</style>
</head>

<body>

<header>
  <div class="title">BBナビ</div>
  <div class="sub">光回線の見積もり</div>
  <div class="devBadge">⚠ 開発中 ⚠</div>
</header>

<div class="wrap">
  <div class="stack">

    <!-- ===== 光回線 ===== -->
    <div class="card">
      <div class="sectionTitle">現在お使いの光回線</div>
      <div id="bbFrom" class="fromRow"></div>

      <div class="divider"></div>

      <div class="sectionTitle">これから乗り換える光回線</div>

      <div class="box">
        <div class="boxTitle"><span class="dot"></span>おすすめ</div>
        <div id="bbPrimary" class="primaryGrid"></div>
      </div>

      <div class="box">
        <div class="boxTitle"><span class="dot"></span>回線種別の確認用（工事要否など）</div>
        <div id="bbType" class="typeGrid"></div>
      </div>
    </div>

    <!-- ===== 住居タイプ（PNG） ===== -->
    <div class="card">
      <div class="sectionTitle">住居タイプ</div>
      <div class="houseGrid" id="housingGrid"></div>
      <div class="subNote">※月額や工事可否に影響します</div>
    </div>

  </div>
</div>

<nav class="appSwitch">
  <a href="ContractNavigator.html">📋</a>
  <a href="CarrierPalette.html">📱</a>
  <a href="BBNavigator.html" class="on">🏠</a>
</nav>

<script>
const STORAGE_KEY = "contract_navi_ctx_v2_multi";

function loadShared(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return { houseNet:{} };
  try{ return JSON.parse(raw); }
  catch{ return { houseNet:{} }; }
}
function saveShared(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* ===== 回線定義 ===== */
const BB_LABEL = {
  docomohikari:"ドコモ光",
  softbankhikari:"ソフトバンク光",
  niftyhikari:"@nifty光",
  fletshikari:"フレッツ光",
  auhikari:"auひかり",
  nurohikari:"NURO光",
  jcom:"J:COM",
  biglobehikari:"ビッグローブ光",
};

const BB_ICON = {
  fletshikari:   "icons/flets.png",
  nurohikari:    "icons/nuro.png",
  docomohikari:  "icons/docomohikari.png",
  niftyhikari:   "icons/nifty.png",
  softbankhikari:"icons/SBhikari.png",
  biglobehikari: "icons/BIGLOBE.png",
  auhikari:      "icons/auhikari.png",
  jcom:          "icons/JCOM.png"
};

/* 主役（大） */
const PRIMARY_PROVIDERS = ["docomohikari","softbankhikari","niftyhikari"];

/* 工事/回線判定（小）：
   - NTT/KDDI を見るために最低限
   - NURO は任意（必要なら残す）
*/
const TYPE_PROVIDERS = ["fletshikari","auhikari","nurohikari"];

function classifyLine(key){
  // “現在回線が何系か”を表示したい場合の簡易分類
  if(key === "auhikari" || key === "jcom") return "KDDI系";
  if(key === "fletshikari" || key === "docomohikari" || key === "softbankhikari" || key === "niftyhikari" || key === "biglobehikari") return "NTT系";
  if(key === "nurohikari") return "そのほか";
  return "未設定";
}

function setToNetType(shared, key){
  shared.houseNet = shared.houseNet || {};
  shared.houseNet.toNetType = key;
  saveShared(shared);
}

function makeCard({key, fromKey, toKey, kind}){
  const isCurrent = (key && fromKey && key === fromKey);
  const isOn = (key === toKey);

  const el = document.createElement("div");
  el.className =
    (kind === "primary" ? "primaryCard" : "typeCard") +
    (isOn ? " on" : "") +
    (isCurrent ? " disabled" : "");

  const img = document.createElement("img");
  img.src = BB_ICON[key] || "";
  img.alt = BB_LABEL[key] || key;
  el.title = isCurrent ? `${img.alt}（現在ご利用中のため選択不可）` : img.alt;

  if(!img.src) img.style.opacity = ".35";
  el.appendChild(img);

  return { el, isCurrent };
}

function renderNet(shared){
  shared.houseNet = shared.houseNet || {};
  const fromKey = shared.houseNet.homeNetType || "";
  const toKey   = shared.houseNet.toNetType || "";

  // --- 乗り換え元 ---
  const fromHost = document.getElementById("bbFrom");
  fromHost.innerHTML = "";

  const big = document.createElement("div");
  big.className = "fromBig";
  const img = document.createElement("img");
  img.src = BB_ICON[fromKey] || "";
  img.alt = BB_LABEL[fromKey] || "未設定";
  big.title = img.alt;
  if(!img.src) img.style.opacity = ".35";
  big.appendChild(img);

  const meta = document.createElement("div");
  meta.className = "fromMeta";
  const b1 = document.createElement("div");
  b1.className = "badge";
  b1.innerHTML = `<span class="dot"></span>${img.alt}`;
  const b2 = document.createElement("div");
  b2.className = "badge";
  b2.innerHTML = `<span class="dot"></span>${classifyLine(fromKey)}`;
  meta.appendChild(b1);
  meta.appendChild(b2);

  fromHost.appendChild(big);
  fromHost.appendChild(meta);

  // --- 乗り換え先：主役（大） ---
  const primaryHost = document.getElementById("bbPrimary");
  primaryHost.innerHTML = "";
  PRIMARY_PROVIDERS.forEach(key=>{
    const { el, isCurrent } = makeCard({ key, fromKey, toKey, kind:"primary" });
    if(!isCurrent){
      el.onclick = ()=>{
        setToNetType(shared, key);
        render();
      };
    }
    primaryHost.appendChild(el);
  });

  // --- 乗り換え先：回線判定（小） ---
  const typeHost = document.getElementById("bbType");
  typeHost.innerHTML = "";
  TYPE_PROVIDERS.forEach(key=>{
    const { el, isCurrent } = makeCard({ key, fromKey, toKey, kind:"type" });
    if(!isCurrent){
      el.onclick = ()=>{
        setToNetType(shared, key);
        render();
      };
    }
    typeHost.appendChild(el);
  });
}

/* ===== 住居タイプ（PNG） ===== */
const HOUSING = [
  { key:"mansion", label:"マンション", icon:"img/apartment.png" },
  { key:"house",   label:"戸建て",     icon:"img/house.png"   }
];

function renderHousing(shared){
  shared.houseNet = shared.houseNet || {};
  const type = shared.houseNet.housingType || "";

  const host = document.getElementById("housingGrid");
  host.innerHTML = "";

  HOUSING.forEach(h=>{
    const card = document.createElement("div");
    card.className = "houseCard" + (h.key === type ? " on" : "");
    card.title = h.label;

    const img = document.createElement("img");
    img.src = h.icon;
    img.alt = h.label;

    const txt = document.createElement("div");
    txt.className = "txt";
    txt.textContent = h.label;

    card.appendChild(img);
    card.appendChild(txt);

    card.onclick = ()=>{
      shared.houseNet.housingType = h.key;
      saveShared(shared);
      render();
    };

    host.appendChild(card);
  });
}

function render(){
  const shared = loadShared();
  renderNet(shared);
  renderHousing(shared);
}

render();
</script>

</body>
</html>
